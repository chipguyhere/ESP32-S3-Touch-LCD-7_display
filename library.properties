sentence=Display and touch driver for the Waveshare ESP32-S3-Touch-LCD-7 board (ST7262 800x480 RGB LCD + GT911 touch via CH422G I2C expander).
paragraph=An all-in-one driver for the Waveshare ESP32-S3-Touch-LCD-7 development board. Provides direct framebuffer access and basic drawing for the 800x480 ST7262-based RGB LCD, and a capacitive touch driver for the GT911 controller. The panel reset and LCD backlight, plus the GT911's reset, are reached through the board's onboard CH422G I2C expander, driven for you by the companion chipguy_ESP32-S3-Touch-LCD-7_board library (a shared, thread-safe I2C bus + expander) that this library depends on. Ships LVGL 9 starter examples so you only have to write your app.
category=Display
